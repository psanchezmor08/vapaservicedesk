version: '3.8'
services:
  vapa-servicedesk:
    image: python:3.11-slim
    container_name: vapa_servicedesk
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # CAMBIA ESTO: Ruta en tu NAS donde guardaremos la BD y los adjuntos a salvo
      - /ruta/real/en/tu/nas/vapa_datos:/datos_persistentes
    working_dir: /app
    command: >
      sh -c "apt-get update && apt-get install -y git &&
      rm -rf /app/* /app/.git &&
      git clone https://github.com/psanchezmor08/vapaservicedesk.git . &&
      ln -sf /datos_persistentes/gestion_incidencias_v3.db /app/gestion_incidencias_v3.db &&
      rm -rf /app/archivos_subidos &&
      ln -sfn /datos_persistentes /app/archivos_subidos &&
      pip install --no-cache-dir -r requirements.txt &&
      streamlit run proyecto.py --server.port=8501 --server.address=0.0.0.0"
